<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page_title">MovieStream | AKHANDA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700;900&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/videojs-netflix-theme@1.0.1/dist/videojs-netflix-theme.css" rel="stylesheet">

    <script>
        // 🛠️ API URL (අන්තිමට / හෝ * එපා)
        const API_BASE_URL = "https://api.moviestream.lat"; 
        
        const MOVIE_DATA = {
            poster: "https://cinesubz.net/wp-content/uploads/2022/01/g841pE2duYUJDUsy6i2NXqCzVBO.jpg", 
            title: "AKHANDA", 
            backdrop: "https://i.pinimg.com/736x/d9/f5/84/d9f584ae1e47ee835a03f266477e4718.jpg", 
            directLink: "https://t.me/c/3759526849/2", // Message ID එක පිරිසිදුවට මෙතනින් වෙන් කරගන්නවා
            description: "Akhanda කියන්නේ action සහ devotional elements එකට එකතු වූ Telugu චිත්‍රපටයක් වන අතර, සමාජයේ අසාධාරණයට විරුද්ධව Akhanda නම් බලවත් චරිතය කරන සටන මෙහි දැක්වේ.",
            duration: "2h 47m",
            language: "Telugu (Sinhala Subtitles)",
            screenshots: [
                "https://i.pinimg.com/1200x/d5/e6/88/d5e68863c7a20102be0a7f989780155b.jpg", 
                "https://i.pinimg.com/736x/59/35/d8/5935d8e701b7b8873b6a7de2070dc9fa.jpg", 
                "https://i.pinimg.com/736x/9f/86/d0/9f86d0d754d1c85f32c7baedaa5227d7.jpg"
            ]
        };
    </script>

    <style>
        :root { --netflix-red: #E50914; }
        body { background-color: #000; color: white; font-family: 'Roboto', 'Noto Sans Sinhala', sans-serif; overflow-x: hidden; }
        .hero-section { position: relative; min-height: 95dvh; background-size: cover; background-position: center; display: flex; align-items: center; }
        .hero-overlay { background: linear-gradient(to right, #000 15%, transparent 100%), linear-gradient(to top, #000 0%, transparent 40%); position: absolute; inset: 0; }
        .video-js { width: 100%; max-width: 1000px; aspect-ratio: 16/9; border-radius: 8px; margin: 0 auto; box-shadow: 0 0 50px rgba(229, 9, 20, 0.4); }
        #video_display_area { display: none; padding: 40px 0; background: #000; }
        .btn-play { background: #fff; color: #000; font-weight: 900; transition: 0.3s; }
        .btn-play:hover { background: var(--netflix-red); color: #fff; transform: scale(1.05); }
        .btn-whatsapp { background: #25D366; transition: 0.3s; }
        .btn-whatsapp:hover { transform: scale(1.05); }
        .poster-img { width: 220px; border-radius: 8px; box-shadow: 0 30px 60px rgba(0,0,0,0.9); }
        .custom-popup { backdrop-filter: blur(20px); background: rgba(0,0,0,0.85); }
        .ss-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; opacity: 0.8; transition: 0.4s; }
        .ss-card:hover img { opacity: 1; transform: scale(1.05); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[50] flex items-center justify-between px-6 py-6 bg-gradient-to-b from-black to-transparent">
        <h1 class="text-2xl font-black italic">MOVIE<span class="text-red-600">STREAM</span></h1>
    </nav>

    <div id="hero" class="hero-section">
        <div class="hero-overlay"></div>
        <div class="relative z-10 w-full max-w-7xl mx-auto px-6 grid lg:grid-cols-3 gap-12 items-center">
            <div class="flex justify-center"><img id="movie_poster" src="" class="poster-img animate__animated animate__fadeInDown"></div>
            <div class="lg:col-span-2 text-center lg:text-left animate__animated animate__fadeInLeft">
                <h1 id="movie_title" class="text-6xl md:text-8xl font-black mb-4 uppercase tracking-tighter"></h1>
                <p id="movie_desc" class="text-gray-300 mb-10 max-w-2xl mx-auto lg:mx-0"></p>
                <div class="flex flex-wrap justify-center lg:justify-start gap-4">
                    <button onclick="warnOnline()" class="btn-play px-10 py-4 uppercase text-sm tracking-widest"><i class="fa-solid fa-play mr-2"></i> Online Watch</button>
                    <button onclick="openStep1()" class="btn-whatsapp text-white px-10 py-4 font-black uppercase text-sm tracking-widest"><i class="fa-brands fa-whatsapp text-xl mr-2"></i> Get on WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <section id="video_display_area">
        <div class="max-w-5xl mx-auto px-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-red-600 font-black uppercase tracking-widest"><i class="fa-solid fa-signal animate-pulse"></i> Link Active</h2>
                <button onclick="closeVideo()"><i class="fa-solid fa-xmark text-3xl hover:text-red-600"></i></button>
            </div>
            <video id="vid-player" class="video-js vjs-netflix-theme" controls preload="auto" crossorigin="anonymous"></video>
        </div>
    </section>

    <div class="bg-black py-12 px-6">
        <div id="screen_list" class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <div id="popup_online_warn" class="fixed inset-0 z-[100] hidden custom-popup items-center justify-center p-6">
        <div class="bg-[#111] border border-white/10 p-8 rounded-2xl max-w-md text-center">
            <h3 class="text-white font-black text-xl mb-4">DATA WARNING</h3>
            <p class="text-gray-400 mb-6">ඔබ Online නැරඹීමට උත්සාහ කරයි. මෙය WhatsApp Package එකෙන් වැඩ නොකරනු ඇත.</p>
            <button onclick="playOnlineNow()" class="w-full bg-white text-black py-4 rounded font-black mb-2">ඔව්, දිගටම යන්න</button>
            <button onclick="closeAllPopups()" class="text-gray-500 text-xs">අවලංගු කරන්න</button>
        </div>
    </div>

    <div id="popup_step1" class="fixed inset-0 z-[100] hidden custom-popup items-center justify-center p-6">
        <div class="bg-[#111] p-8 rounded-2xl max-w-md w-full">
            <h3 class="text-white font-black text-xl mb-6">WhatsApp Number</h3>
            <input type="tel" id="user_num" placeholder="947XXXXXXXX" class="w-full bg-black border border-white/10 p-4 rounded text-white text-xl mb-4 text-center">
            <button onclick="validateStep1()" class="w-full btn-whatsapp py-4 rounded font-black text-white">Next Step</button>
        </div>
    </div>

    <div id="popup_congrats" class="fixed inset-0 z-[100] hidden custom-popup items-center justify-center p-6 text-center">
        <div class="bg-[#111] p-10 rounded-2xl max-w-md w-full">
            <div class="text-5xl mb-4">🎉</div>
            <h3 class="text-white font-black text-xl mb-4">REQUEST SUCCESS!</h3>
            <button onclick="location.reload()" class="w-full bg-white text-black py-4 rounded font-black">හරි</button>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        let vjsPlayer = null;

        window.onload = () => {
            document.getElementById('hero').style.backgroundImage = `url('${MOVIE_DATA.backdrop}')`;
            document.getElementById('movie_poster').src = MOVIE_DATA.poster;
            document.getElementById('movie_title').innerText = MOVIE_DATA.title;
            document.getElementById('movie_desc').innerText = MOVIE_DATA.description;
            MOVIE_DATA.screenshots.forEach(s => {
                document.getElementById('screen_list').innerHTML += `<div class="ss-card"><img src="${s}"></div>`;
            });
        };

        function closeAllPopups() {
            ['popup_step1', 'popup_online_warn', 'popup_congrats'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        }

        function warnOnline() { closeAllPopups(); document.getElementById('popup_online_warn').style.display = 'flex'; }
        function openStep1() { closeAllPopups(); document.getElementById('popup_step1').style.display = 'flex'; }

        function playOnlineNow() {
            closeAllPopups();
            const area = document.getElementById('video_display_area');
            
            // 🛠️ පිරිසිදු Message ID එක පමණක් ලබා ගැනීම (පරණ ලෙඩේ Fix කළා)
            const pathParts = MOVIE_DATA.directLink.split('/');
            const msgId = pathParts[pathParts.length - 1].replace(/[^0-9]/g, ''); 
            
            area.style.display = 'block';
            area.scrollIntoView({ behavior: 'smooth' });

            if (!vjsPlayer) {
                vjsPlayer = videojs('vid-player', { fluid: true });
            }
            
            const streamUrl = `${API_BASE_URL}/stream/${msgId}`;
            console.log("Stream URL:", streamUrl); // මෙතන දැන් පිරිසිදු URL එක එනවා
            
            vjsPlayer.src({ type: 'video/mp4', src: streamUrl });
            vjsPlayer.load();
            vjsPlayer.play();
        }

        function validateStep1() {
            const num = document.getElementById('user_num').value.trim();
            if(num.length >= 11) {
                localStorage.setItem('ms_user_num', num);
                finalRequest();
            }
        }

        async function finalRequest() {
            const num = localStorage.getItem('ms_user_num');
            try {
                const res = await fetch(`${API_BASE_URL}/send-movie`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number: num, movieName: MOVIE_DATA.title, directLink: MOVIE_DATA.directLink })
                });
                if(res.ok) {
                    closeAllPopups();
                    document.getElementById('popup_congrats').style.display = 'flex';
                }
            } catch (e) { alert("Error!"); }
        }

        function closeVideo() { if(vjsPlayer) vjsPlayer.pause(); document.getElementById('video_display_area').style.display = 'none'; }
    </script>
</body>
</html>
